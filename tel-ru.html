    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const inputs = document.querySelectorAll(".number-ru");

            inputs.forEach(input => {

                input.addEventListener("input", function () {
                    let value = this.value.replace(/\D/g, "");

                    // Убираем код страны, если пользователь ввел его
                    if (value.startsWith("7")) value = value.slice(1);
                    if (value.startsWith("8")) value = value.slice(1);

                    // Максимум 10 цифр после +7
                    value = value.substring(0, 10);

                    let result = "+7";

                    if (value.length > 0) result += " " + value.substring(0, 3);
                    if (value.length > 3) result += " " + value.substring(3, 6);
                    if (value.length > 6) result += "-" + value.substring(6, 8);
                    if (value.length > 8) result += "-" + value.substring(8, 10);

                    this.value = result;
                });

                input.addEventListener("focus", function () {
                    if (!this.value) {
                        this.value = "+7 ";
                    }
                });

            });
        });
    </script>
</body>
